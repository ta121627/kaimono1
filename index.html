<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="買い物チェックリスト">

<title>買い物チェックリスト</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Hiragino Sans",sans-serif;background:#FFF5F8;color:#1C1C1E;-webkit-font-smoothing:antialiased;min-height:100vh;}
input,button{font-family:inherit;}button{cursor:pointer;}
:focus-visible{outline:2px solid #FF3B81;outline-offset:2px;}

/* ナビバー */
.navbar{position:sticky;top:0;z-index:50;height:44px;padding-top:env(safe-area-inset-top);display:flex;align-items:center;justify-content:center;border-bottom:0.5px solid transparent;transition:background .25s,border-color .25s;}
.navbar.scrolled{background:rgba(255,245,248,0.82);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom-color:#F0DCE4;}
.navtitle{font-size:17px;font-weight:600;opacity:0;transition:opacity .25s;height:44px;line-height:44px;}
.navbar.scrolled .navtitle,.navbar.always-title .navtitle{opacity:1;}
.navbtn{position:absolute;top:calc(env(safe-area-inset-top) + 4px);width:36px;height:36px;border:none;border-radius:50%;background:#FFFFFF;color:#FF3B81;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(214,51,108,.10),0 4px 12px rgba(214,51,108,.08);transition:transform .12s,background .12s;}
.navbtn:active{transform:scale(.9);background:#FFF0F4;}
.navbtn svg{width:18px;height:18px;display:block;}
.navbtn.right{right:12px;}.navbtn.left{left:12px;}
.syncdot{width:8px;height:8px;border-radius:50%;background:#34C759;position:absolute;top:6px;right:6px;display:none;}
.syncdot.on{display:block;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

/* ヒーロー */
.hero{padding:4px 20px 10px;}
.hero h1{font-size:31px;font-weight:700;letter-spacing:-.5px;}
.hero .sub{font-size:15px;color:#A8949D;margin-top:3px;font-weight:500;}

/* ホーム・アーカイブ共通カード */
.lists-wrap{padding:6px 16px 0;}
.list-cards-box{background:#FFFFFF;border-radius:16px;overflow:hidden;box-shadow:0 1px 0 rgba(0,0,0,.02),0 10px 30px rgba(255,59,129,.06);}
.lcard-wrap{position:relative;}
.lcard-delbg{position:absolute;inset:0;display:flex;justify-content:flex-end;align-items:stretch;background:#FF3B30;}
.lcard-delbtn{width:80px;border:none;background:transparent;color:#fff;font-size:15px;font-weight:600;}
.lcard-delbtn:active{background:rgba(0,0,0,.12);}
.lcard{position:relative;z-index:1;background:#FFFFFF;display:flex;align-items:center;padding:14px 16px;border-bottom:0.5px solid #F2E6EC;gap:13px;touch-action:pan-y;will-change:transform;}
.lcard-wrap:last-child .lcard{border-bottom:none;}
.lcard:active{background:#FFF5F8;}
.lcard-icon{width:44px;height:44px;border-radius:12px;background:#FFF0F4;display:flex;align-items:center;justify-content:center;font-size:22px;flex:0 0 auto;}
.lcard-info{flex:1;min-width:0;}
.lcard-name{font-size:17px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.lcard-meta{display:flex;align-items:center;justify-content:space-between;margin-top:2px;}
.lcard-count{font-size:13px;color:#A8949D;}
.lcard-date{font-size:12px;color:#C9B8C0;}
.lcard-arr{color:#D4C0C9;flex:0 0 auto;}
/* アーカイブカード：スワイプなし */
.lcard.arc{touch-action:auto;}
.restore-btn{border:1.5px solid #FF3B81;background:transparent;color:#FF3B81;border-radius:10px;padding:6px 12px;font-size:13px;font-weight:600;flex:0 0 auto;white-space:nowrap;}
.restore-btn:active{background:#FFF0F4;}
.home-empty{text-align:center;color:#C2B2BA;padding:56px 24px;}
.home-empty .em{font-size:50px;margin-bottom:12px;}
.home-empty .t{font-size:17px;font-weight:600;color:#8A7680;}
.home-empty .d{font-size:14px;margin-top:5px;}

/* 下部：新規ボタン＋タブバー */
.home-bottom{position:fixed;left:0;right:0;bottom:0;z-index:40;background:rgba(255,245,248,.94);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-top:0.5px solid #F0DCE4;}
.home-add-wrap{padding:8px 16px 0;}
.home-new-btn{width:100%;border:none;border-radius:13px;padding:14px;background:#FF3B81;color:#fff;font-size:17px;font-weight:600;box-shadow:0 4px 14px rgba(255,59,129,.30);transition:background .12s;}
.home-new-btn:active{background:#E62E70;}
.tab-bar{display:flex;padding-bottom:env(safe-area-inset-bottom);}
.tab-item{flex:1;border:none;background:transparent;padding:10px 0 8px;display:flex;flex-direction:column;align-items:center;gap:3px;color:#B0A0A8;transition:color .15s;}
.tab-item.active{color:#FF3B81;}
.tab-item svg{width:23px;height:23px;}
.tab-label{font-size:10px;font-weight:600;letter-spacing:.2px;}

/* リスト画面 */
body.on-list{overflow:hidden;}
.list-wrap{padding:6px 16px 0;}
.card{background:#FFFFFF;border-radius:16px;overflow:hidden;box-shadow:0 1px 0 rgba(0,0,0,.02),0 10px 30px rgba(255,59,129,.06);}
.cell{position:relative;background:#FFFFFF;}
.cell.enter{animation:cellIn .3s cubic-bezier(.2,.8,.2,1);}
@keyframes cellIn{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:none;}}
.delbg{position:absolute;inset:0;display:flex;justify-content:flex-end;align-items:stretch;background:#FF3B30;}
.delbtn{width:72px;border:none;background:transparent;color:#fff;font-size:15px;font-weight:600;height:100%;}
.delbtn:active{background:rgba(0,0,0,.12);}
.row{position:relative;z-index:1;background:#FFFFFF;display:flex;align-items:center;gap:13px;padding:13px 16px;min-height:56px;border-bottom:0.5px solid #F2E6EC;touch-action:pan-y;will-change:transform;}
.cell:last-child .row{border-bottom:none;}
.check{width:27px;height:27px;border-radius:50%;flex:0 0 auto;border:2.5px solid #FFC2D8;background:#FFFFFF;display:flex;align-items:center;justify-content:center;transition:background .2s,border-color .2s;}
.check.on{background:#FF3B81;border-color:#FF3B81;}
.check.pop{animation:pop .36s cubic-bezier(.2,.9,.3,1.4);}
@keyframes pop{0%{transform:scale(1);}40%{transform:scale(1.22);}100%{transform:scale(1);}}
.tick{color:#fff;font-size:15px;font-weight:800;line-height:1;opacity:0;transform:scale(.4);transition:opacity .18s,transform .18s;}
.check.on .tick{opacity:1;transform:scale(1);}
.iname{flex:1;min-width:0;font-size:17px;line-height:1.3;word-break:break-word;transition:color .2s;}
.row.done .iname{color:#C9C2C6;text-decoration:line-through;}
.by{font-size:12px;color:#C2B2BA;flex:0 0 auto;font-weight:500;}
.clear{display:block;margin:16px auto 4px;border:none;background:transparent;color:#FF3B81;font-size:15px;font-weight:500;padding:8px 14px;border-radius:10px;}
.clear:active{background:rgba(255,59,129,.1);}
.empty{text-align:center;color:#C2B2BA;padding:72px 24px;}
.empty .em{font-size:50px;margin-bottom:12px;}
.empty .t{font-size:17px;font-weight:600;color:#8A7680;}
.empty .d{font-size:14px;margin-top:5px;}
.addbar{position:fixed;left:0;right:0;bottom:0;z-index:40;padding:10px 16px calc(10px + env(safe-area-inset-bottom));background:rgba(255,245,248,.9);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-top:0.5px solid #F0DCE4;display:flex;gap:10px;align-items:center;}
.addbar input{flex:1;border:none;background:#FFFFFF;border-radius:13px;padding:13px 16px;font-size:16px;outline:none;color:#1C1C1E;box-shadow:0 2px 10px rgba(214,51,108,.08);}
.addbar input::placeholder{color:#C9B8C0;}
.plus{width:46px;height:46px;flex:0 0 auto;border:none;border-radius:50%;background:#FF3B81;color:#fff;font-size:26px;line-height:46px;font-weight:300;box-shadow:0 4px 14px rgba(255,59,129,.45);transition:transform .12s,background .12s;}
.plus:active{transform:scale(.92);background:#E62E70;}

/* リスト画面：可視領域に固定したflexレイアウト（リストだけスクロール／入力バーは常にキーボード直上に固定） */
#listScreen{position:fixed;left:0;right:0;top:0;height:100%;display:flex;flex-direction:column;overflow:hidden;}
#listScreen.off{display:none;}
#listScreen .navbar{position:relative;flex:0 0 auto;}
#listScreen .hero{flex:0 0 auto;}
#listScreen #suggestBar{flex:0 0 auto;}
#listScreen .list-wrap{flex:1 1 auto;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:12px;}
#listScreen .addbar{position:static;flex:0 0 auto;}
#listScreen.kb-open .addbar{padding-bottom:8px;}

/* よく買うもの候補 */
.suggest-bar{padding:0 16px 8px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.suggest-lbl{font-size:12px;color:#A8949D;font-weight:500;white-space:nowrap;}
.suggest-chip{border:1.5px solid #FFC2D8;background:#FFF0F4;color:#E62E70;border-radius:20px;padding:5px 12px;font-size:14px;font-weight:500;transition:background .12s;white-space:nowrap;}
.suggest-chip:active{background:#FFE0EC;}

/* トースト・オーバーレイ */
.toast{position:fixed;top:calc(60px + env(safe-area-inset-top));left:50%;transform:translateX(-50%) translateY(-8px);background:rgba(28,28,30,.88);color:#fff;padding:10px 18px;border-radius:20px;font-size:14px;font-weight:500;pointer-events:none;opacity:0;transition:opacity .2s,transform .2s;z-index:200;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.overlay{position:fixed;top:0;left:0;right:0;height:100vh;z-index:100;background:rgba(0,0,0,.4);display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .3s;}
.overlay.show{opacity:1;pointer-events:auto;}
.sheet{width:100%;background:#FFFFFF;border-radius:18px 18px 0 0;padding:20px 18px calc(24px + env(safe-area-inset-bottom));transform:translateY(100%);transition:transform .3s cubic-bezier(.2,.8,.2,1);max-height:90vh;overflow-y:auto;}
.overlay.show .sheet{transform:translateY(0);}
.sheet h3{font-size:19px;font-weight:700;text-align:center;margin-bottom:16px;}
.field{margin-bottom:14px;}
.field label{font-size:12px;color:#A8949D;font-weight:600;display:block;margin-bottom:6px;padding-left:2px;}
.field input{width:100%;border:none;background:#FFF0F4;border-radius:12px;padding:13px 15px;font-size:16px;outline:none;color:#1C1C1E;}
.syncbox{background:#FFF0F4;border-radius:12px;padding:4px 0;margin-bottom:14px;}
.syncbox.on{background:#FFE9F1;}
.syncrow{display:flex;justify-content:space-between;padding:11px 15px;font-size:15px;}
.syncrow:not(:last-child){border-bottom:0.5px solid #F2DCE6;}
.syncrow .sv{color:#A8949D;}.syncbox.on .syncrow .sv{color:#E62E70;font-weight:600;}
.roomcode{background:#FFF0F4;border-radius:14px;padding:18px 12px;font-size:28px;font-weight:800;letter-spacing:6px;text-align:center;color:#FF3B81;margin-bottom:12px;font-variant-numeric:tabular-nums;}
.hint{font-size:13px;color:#5A4A52;line-height:1.65;margin-bottom:14px;padding:0 2px;}
.btn{width:100%;border:none;border-radius:13px;padding:14px;font-size:17px;font-weight:600;margin-bottom:0;}
.btn.pink{background:#FF3B81;color:#fff;}.btn.pink:active{background:#E62E70;}
.btn.ghost{background:#FFF0F4;color:#FF3B81;}.btn.ghost:active{background:#FFE0EC;}
.btn.red{background:#FF3B30;color:#fff;}.btn.red:active{background:#D4291F;}
.btn.sub{background:transparent;color:#A8949D;font-size:15px;padding:10px;}
.btn:disabled{opacity:.5;}
.gap{height:10px;}
.divider{text-align:center;color:#C2B2BA;font-size:13px;margin:14px 0;}
.off{display:none;}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
</style>
</head>
<body>

<script>
const BROKER = "wss://broker.hivemq.com:8884/mqtt";
const ICONS   = ["🛒","📝","🏠","🎁","💊","🍱","🧹","📦","🌸","💄","🍳","🐶"];
const PURGE_MS = 30*24*60*60*1000; // 削除済みリストは30日間ゴミ箱から復元可能
const VAPID_PUBLIC_KEY = "BEujRUBxUzOeWUuya7d3HSmpTOfbchabRGdeB-vQiSSdCwvsRI5Y6WQTD6e6iaqyT7B1505QZBw_GfhmpoCu3Ws";

let lists         = [];
let currentListId = null;
let currentTab    = "home";
let meName  = localStorage.getItem("kaimono_me")   || "";
let roomId  = localStorage.getItem("kaimono_room") || "";
const WORKER_URL = "https://jolly-sky-df6b.taiga1216270.workers.dev";
const deviceId = localStorage.getItem("kaimono_device") || (()=>{ const id=Date.now().toString(36)+Math.random().toString(36).slice(2,7); localStorage.setItem("kaimono_device",id); return id; })();
let swReg = null;
let CLOUD   = false, mqttClient = null, remoteAt = 0, lastPublishAt = 0;
let suppressTap = false, sw  = null;
let hSuppressTap= false, hsw = null;

const $ = id => document.getElementById(id);
const overlay = $("overlay"), sheet = $("sheet");
const listEl  = $("list"), listsWrap = $("listsWrap");
const esc = s => String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const newId   = () => Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const fmtDate = ts => { const d=new Date(ts||Date.now()); return `${d.getMonth()+1}/${d.getDate()}`; };

function currentList(){ return lists.find(l=>l.id===currentListId)||null; }
function mqttTopic(){ return `kaimono-app/${roomId}/data`; }

/* トースト */
let toastTimer;
function toast(msg){ const el=$("toast"); el.textContent=msg; el.classList.add("show"); clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.remove("show"),2500); }

/* プッシュ通知 */
function urlB64ToArr(b64){
  const pad="=".repeat((4-b64.length%4)%4);
  const raw=atob((b64+pad).replace(/-/g,"+").replace(/_/g,"/"));
  return Uint8Array.from(raw,c=>c.charCodeAt(0));
}
async function initPush(){
  if(!("serviceWorker" in navigator)) return;
  try{
    swReg=await navigator.serviceWorker.register("./sw.js");
    await navigator.serviceWorker.ready;
  }catch(e){ console.warn("SW登録失敗",e); }
}
async function subscribePush(){
  if(!roomId){ toast("先に同期ルームを設定してください"); return; }
  if(!("serviceWorker" in navigator)||typeof Notification==="undefined"){
    toast("このブラウザは通知に非対応です"); return;
  }
  // iOS は requestPermission をタップ直後に呼ぶ必要があるので最初に実行
  let perm;
  try{ perm=await Notification.requestPermission(); }
  catch(e){ toast("通知の許可を取得できませんでした"); return; }
  if(perm!=="granted"){ toast("通知が許可されていません。iPhoneの「設定」→このアプリ→通知を確認してください"); return; }
  if(!swReg) await initPush();
  if(!swReg){ toast("通知の初期化に失敗しました。再読み込みして試してください"); return; }
  if(!swReg.pushManager){ toast("ホーム画面に追加したアプリから開いてください"); return; }
  try{
    let sub=await swReg.pushManager.getSubscription();
    if(sub){ try{ await sub.unsubscribe(); }catch(_){ } sub=null; } // 古い鍵の購読を破棄して作り直す
    sub=await swReg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:urlB64ToArr(VAPID_PUBLIC_KEY)});
    const res=await fetch(`${WORKER_URL}/subscribe`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({roomId,deviceId,subscription:sub.toJSON()})});
    if(res.ok) toast("プッシュ通知を有効にしました 🔔");
    else toast("通知サーバーへの登録に失敗（"+res.status+"）");
  }catch(e){ console.warn("Push subscribe",e); toast("購読エラー: "+e.message); }
}
function notifyPartner(body){
  if(!WORKER_URL||!roomId) return;
  fetch(`${WORKER_URL}/notify`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({roomId,senderDeviceId:deviceId,payload:JSON.stringify({title:"買い物チェックリスト",body})})}).catch(()=>{});
}
function autoResubscribe(){
  // 既に許可済みのときだけ、新しいルーム用に購読を静かに再登録する
  if(typeof Notification!=="undefined"&&Notification.permission==="granted") subscribePush();
}
async function sendTestPush(){
  if(!roomId){ toast("先に同期ルームを設定してください"); return; }
  toast("テスト送信中…");
  try{
    const res=await fetch(`${WORKER_URL}/notify`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({roomId,senderDeviceId:"__test__",payload:JSON.stringify({title:"買い物チェックリスト",body:"テスト通知です 🔔"})})});
    let info=null; try{ info=await res.json(); }catch(_){}
    if(!res.ok){ toast("送信失敗（HTTP "+res.status+"）"); return; }
    if(!info){ toast("送信しました"); return; }
    if(info.total===0){ toast("購読中の端末がありません。各端末で『通知を有効にする』を押してください"); return; }
    if(info.sent>0) toast(`送信成功 ${info.sent}/${info.total} 件`);
    else toast(`送信失敗 ${info.failed}件（${info.lastErr||"不明"}）`);
  }catch(e){ toast("送信エラー: "+e.message); }
}

/* ローカル保存 */
function loadLocal(){
  try{ lists=JSON.parse(localStorage.getItem("kaimono_lists"))||[]; }catch(e){ lists=[]; }
  if(lists.length===0){
    try{
      const old=JSON.parse(localStorage.getItem("kaimono_items")||"[]");
      if(old.length>0){ lists=[{id:newId(),name:"買い物リスト",items:old,createdAt:Date.now(),at:Date.now()}]; saveLocal(); }
    }catch(e){}
  }
}
function saveLocal(){ localStorage.setItem("kaimono_lists",JSON.stringify(lists)); }

/* マージ */
function mergeItems(loc,rem){
  const byId={};
  for(const r of rem) byId[r.id]=r;
  for(const l of loc){ if(!byId[l.id]||(l.at||0)>(byId[l.id].at||0)) byId[l.id]=l; }
  return Object.values(byId).filter(i=>!i._del||(Date.now()-(i._delAt||0))<PURGE_MS);
}
function applyRemote(data){
  if(!data||!Array.isArray(data.lists)) return;
  if((data.at||0)<=remoteAt) return;
  remoteAt=data.at;
  const isOwnEcho=(data.at===lastPublishAt);
  // 変更前のアイテム数をスナップショット
  const prevItemIds=new Set();
  const prevListIds=new Set(lists.filter(l=>!l._del).map(l=>l.id));
  for(const l of lists) for(const it of l.items) if(!it._del) prevItemIds.add(it.id);
  const byId={};
  for(const r of data.lists) byId[r.id]=r;
  for(const l of lists){
    if(!byId[l.id]) byId[l.id]=l;
    else byId[l.id]={...((l.at||0)>(byId[l.id].at||0)?l:byId[l.id]), items:mergeItems(l.items,byId[l.id].items)};
  }
  lists=Object.values(byId).filter(l=>!l._del||(Date.now()-(l._delAt||0))<PURGE_MS);
  saveLocal();
  if(!isOwnEcho){
    // 新しいリストが追加されたか検出
    const newLists=lists.filter(l=>!l._del&&!prevListIds.has(l.id));
    // 新しいアイテムが追加されたか検出
    let newItemCount=0;
    for(const l of lists) for(const it of l.items) if(!it._del&&!prevItemIds.has(it.id)) newItemCount++;
    if(newLists.length>0&&newItemCount===0){
      toast(`「${newLists[0].name}」が追加されました`);
    } else if(newItemCount>0){
      toast(`${newItemCount}件の項目が追加されました`);
    }
  }
  if(currentListId){ renderList(); renderSuggestions(); }
  else if(currentTab==="home") renderHome();
  else renderArchive();
}

/* MQTT */
function loadMQTTLib(){
  return new Promise((resolve,reject)=>{
    if(window.mqtt){resolve();return;}
    const s=document.createElement("script");
    s.src="https://unpkg.com/mqtt@5.3.4/dist/mqtt.min.js";
    s.onload=resolve; s.onerror=()=>reject(new Error("MQTT読み込み失敗"));
    document.head.appendChild(s);
  });
}
function mqttPublish(){
  if(!mqttClient||!mqttClient.connected) return;
  lastPublishAt=Date.now();
  mqttClient.publish(mqttTopic(),JSON.stringify({at:lastPublishAt,lists}),{retain:true,qos:1});
}
async function startSync(){
  if(mqttClient) return;
  await loadMQTTLib();
  mqttClient=window.mqtt.connect(BROKER,{clientId:"kaimono_"+Math.random().toString(36).slice(2,10),clean:true,reconnectPeriod:5000,keepalive:60,connectTimeout:15000});
  mqttClient.on("connect",()=>{ CLOUD=true; $("syncdot").classList.add("on"); mqttClient.subscribe(mqttTopic(),{qos:1}); setTimeout(()=>{ if(lists.length>0) mqttPublish(); },1500); });
  mqttClient.on("message",(_,msg)=>{ try{ applyRemote(JSON.parse(msg.toString())); }catch(e){} });
  mqttClient.on("reconnect",()=>{ CLOUD=false; $("syncdot").classList.remove("on"); });
  mqttClient.on("error",e=>console.warn("MQTT",e));
  mqttClient.on("offline",()=>{ CLOUD=false; $("syncdot").classList.remove("on"); });
}
function stopSync(){ if(mqttClient){mqttClient.end();mqttClient=null;} CLOUD=false; $("syncdot").classList.remove("on"); }
document.addEventListener("visibilitychange",()=>{ if(document.visibilityState==="visible"&&roomId&&!mqttClient) startSync(); });

/* データ操作 */
function addItem(name){
  const l=currentList(); if(!l) return;
  const it={id:newId(),name,checked:false,addedBy:meName||"",order:Date.now(),checkedAt:0,at:Date.now()};
  l.items.push(it); l.at=Date.now(); saveLocal(); renderList({enterId:it.id}); renderSuggestions(); mqttPublish();
  notifyPartner(`${meName||"パートナー"}が「${name}」を追加しました`);
}
function toggle(id){
  const l=currentList(); if(!l) return;
  const it=l.items.find(x=>x.id===id); if(!it) return;
  it.checked=!it.checked; it.checkedAt=it.checked?Date.now():0; it.at=Date.now(); l.at=Date.now();
  saveLocal(); renderList({toggledId:id}); mqttPublish();
  if(it.checked) checkAutoArchive();
}
function checkAutoArchive(){
  const l=currentList(); if(!l||l.archived) return;
  const vis=l.items.filter(i=>!i._del);
  if(vis.length>0&&vis.every(i=>i.checked)){
    const listId=l.id;
    setTimeout(()=>{
      const fresh=lists.find(x=>x.id===listId); if(!fresh||fresh.archived) return;
      const visNow=fresh.items.filter(i=>!i._del);
      if(!(visNow.length>0&&visNow.every(i=>i.checked))) return;
      fresh.archived=true; fresh.archivedAt=Date.now(); fresh.at=Date.now();
      saveLocal(); mqttPublish();
      toast("全部完了！アーカイブに移動しました ✓");
      setTimeout(()=>{ switchTab("archive"); goHome(); },1000);
    },600);
  }
}
function removeItem(id){
  const l=currentList(); if(!l) return;
  const it=l.items.find(x=>x.id===id);
  if(it&&CLOUD){it._del=true;it._delAt=Date.now();it.at=Date.now();}
  else{l.items=l.items.filter(x=>x.id!==id);}
  l.at=Date.now(); saveLocal(); renderList(); mqttPublish();
}
function clearCompleted(){
  const l=currentList(); if(!l) return;
  const now=Date.now();
  if(CLOUD){l.items.filter(i=>i.checked).forEach(i=>{i._del=true;i._delAt=now;i.at=now;});}
  else{l.items=l.items.filter(i=>!i.checked);}
  l.at=now; saveLocal(); renderList(); mqttPublish();
}
function sorted(){
  const l=currentList(); if(!l) return [];
  return [...l.items].filter(i=>!i._del).sort((a,b)=>{
    if(!!a.checked!==!!b.checked) return a.checked?1:-1;
    if(a.checked) return (a.checkedAt||0)-(b.checkedAt||0);
    return (a.order||0)-(b.order||0);
  });
}

/* 描画：リスト画面 */
function cellHTML(i,opts){
  const checked=i.checked;
  const by=(!checked&&i.addedBy)?`<span class="by">${esc(i.addedBy)}</span>`:"";
  const enter=(opts&&i.id===opts.enterId)?" enter":"";
  return `<div class="cell${enter}" data-id="${i.id}">
    <div class="delbg"><button class="delbtn" data-act="del" data-id="${i.id}">削除</button></div>
    <div class="row ${checked?'done':''}" data-act="tap" data-id="${i.id}">
      <span class="check ${checked?'on':''}"><span class="tick">✓</span></span>
      <span class="iname">${esc(i.name)}</span>${by}
    </div>
  </div>`;
}
function renderList(opts={}){
  const old={};
  listEl.querySelectorAll(".cell").forEach(c=>{old[c.dataset.id]=c.getBoundingClientRect().top;});
  const arr=sorted();
  const left=arr.filter(i=>!i.checked).length;
  $("sub").textContent=arr.length===0?"リストはまだ空です":(left>0?`あと ${left} 個`:"全部そろいました 🎉");
  if(arr.length===0){listEl.innerHTML=`<div class="empty"><div class="em">🛒</div><div class="t">リストはまだ空です</div><div class="d">下に入力して追加しましょう</div></div>`;return;}
  let html=`<div class="card">`+arr.map(i=>cellHTML(i,opts)).join("")+`</div>`;
  if(arr.some(i=>i.checked)) html+=`<button class="clear" data-act="clear">チェック済みを消す</button>`;
  listEl.innerHTML=html;
  requestAnimationFrame(()=>{
    listEl.querySelectorAll(".cell").forEach(c=>{
      const id=c.dataset.id;
      if(old[id]!==undefined){
        const dy=old[id]-c.getBoundingClientRect().top;
        if(dy){c.style.transition="none";c.style.transform=`translateY(${dy}px)`;requestAnimationFrame(()=>{c.style.transition="transform .36s cubic-bezier(.2,.8,.2,1)";c.style.transform="";});}
      }
    });
    if(opts.toggledId){const chk=listEl.querySelector(`.cell[data-id="${opts.toggledId}"] .check`);if(chk){chk.classList.add("pop");setTimeout(()=>chk.classList.remove("pop"),380);}}
    if(opts.enterId){const lw=document.querySelector(".list-wrap");if(lw) lw.scrollTop=lw.scrollHeight;} // 追加時は最下部までスクロール
  });
}

/* よく買うもの候補 */
function getSuggestions(){
  const cur=currentList();
  const curNames=new Set((cur?.items||[]).filter(i=>!i._del).map(i=>i.name.toLowerCase()));
  const freq={};
  for(const l of lists) for(const it of l.items){
    if(it._del||!it.name) continue;
    const n=it.name.trim(); freq[n]=(freq[n]||0)+1;
  }
  return Object.entries(freq).filter(([n])=>!curNames.has(n.toLowerCase())).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([n])=>n);
}
function renderSuggestions(){
  const el=$("suggestBar"); if(!el) return;
  const s=getSuggestions();
  if(!s.length){el.innerHTML="";return;}
  el.innerHTML=`<div class="suggest-bar"><span class="suggest-lbl">よく買うもの：</span>${s.map(n=>`<button class="suggest-chip" data-sug="${esc(n)}">${esc(n)}</button>`).join("")}</div>`;
}
$("suggestBar").addEventListener("click",e=>{
  const c=e.target.closest("[data-sug]"); if(!c) return;
  addItem(c.dataset.sug);
});

/* 描画：ホーム */
function renderHome(){
  const active=lists.filter(l=>!l._del&&!l.archived);
  $("homeSub").textContent=active.length===0?"リストを作成しましょう":`${active.length}件のリスト`;
  if(active.length===0){listsWrap.innerHTML=`<div class="home-empty"><div class="em">📋</div><div class="t">リストがありません</div><div class="d">下の＋ボタンで作成できます</div></div>`;return;}
  let html=`<div class="list-cards-box">`;
  active.forEach((l,i)=>{
    const vis=l.items.filter(x=>!x._del), undone=vis.filter(x=>!x.checked).length, total=vis.length;
    const cnt=total===0?"空":(undone>0?`あと ${undone} 個`:"全部完了 ✓");
    html+=`<div class="lcard-wrap" data-listid="${l.id}">
      <div class="lcard-delbg"><button class="lcard-delbtn" data-act="listdel" data-listid="${l.id}">削除</button></div>
      <div class="lcard" data-act="openlist" data-listid="${l.id}">
        <div class="lcard-icon">${ICONS[i%ICONS.length]}</div>
        <div class="lcard-info"><div class="lcard-name">${esc(l.name)}</div><div class="lcard-meta"><span class="lcard-count">${cnt}</span><span class="lcard-date">${fmtDate(l.createdAt)}</span></div></div>
        <svg class="lcard-arr" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
    </div>`;
  });
  listsWrap.innerHTML=html+`</div>`;
}

/* 描画：アーカイブ */
function renderArchive(){
  const arc=lists.filter(l=>!l._del&&l.archived);
  $("homeSub").textContent=arc.length===0?"アーカイブは空です":`${arc.length}件のアーカイブ`;
  if(arc.length===0){listsWrap.innerHTML=`<div class="home-empty"><div class="em">📦</div><div class="t">アーカイブは空です</div><div class="d">全アイテムにチェックを入れると自動保存されます</div></div>`;return;}
  let html=`<div class="list-cards-box">`;
  arc.forEach((l,i)=>{
    const vis=l.items.filter(x=>!x._del);
    html+=`<div class="lcard-wrap" data-listid="${l.id}">
      <div class="lcard arc" data-listid="${l.id}">
        <div class="lcard-icon">${ICONS[i%ICONS.length]}</div>
        <div class="lcard-info"><div class="lcard-name">${esc(l.name)}</div><div class="lcard-meta"><span class="lcard-count">${vis.length}個完了</span><span class="lcard-date">${fmtDate(l.createdAt)}</span></div></div>
        <button class="restore-btn" data-act="restore" data-listid="${l.id}">復元</button>

  });

}

function openList(id){
  currentListId=id;
  const l=currentList(); if(!l) return;

/* エッジスワイプ（iPhoneの戻るジェスチャー） */
let edgeSw=null;
document.addEventListener("touchstart",e=>{
  if(!currentListId) return;
  const t=e.touches[0];
  if(t.clientX<24) edgeSw={x:t.clientX,y:t.clientY,locked:null};
},{passive:true});
document.addEventListener("touchmove",e=>{
  if(!edgeSw||!currentListId) return;
  const t=e.touches[0],dx=t.clientX-edgeSw.x,dy=t.clientY-edgeSw.y;
  if(!edgeSw.locked){
    if(dx>8&&Math.abs(dx)>Math.abs(dy)) edgeSw.locked="h";
    else if(Math.abs(dy)>8||dx<-4){edgeSw=null;return;}
    else return;
  }
  if(edgeSw.locked==="h"){
    const ls=$("listScreen");
    ls.style.transition="none";
    ls.style.transform=`translateX(${Math.max(0,dx)}px)`;
  }
},{passive:true});
document.addEventListener("touchend",e=>{
  if(!edgeSw||!currentListId){edgeSw=null;return;}
  const t=e.changedTouches[0],dx=t.clientX-edgeSw.x;
  const ls=$("listScreen");
  if(edgeSw.locked==="h"&&dx>80){
    ls.style.transition="transform .25s cubic-bezier(.4,0,.2,1)";
    ls.style.transform=`translateX(${window.innerWidth}px)`;
    setTimeout(()=>{ls.style.transform="";ls.style.transition="";goHome();},240);
  } else if(edgeSw.locked==="h"){
    ls.style.transition="transform .3s cubic-bezier(.4,0,.2,1)";
    ls.style.transform="translateX(0)";
    setTimeout(()=>{ls.style.transform="";ls.style.transition="";},300);
  }
  edgeSw=null;
},{passive:true});

/* スワイプ削除：リスト画面 */
function txOf(el){const m=/translateX\(([-0-9.]+)px\)/.exec(el.style.transform||"");return m?parseFloat(m[1]):0;}
function closeOthers(ex){listEl.querySelectorAll(".row").forEach(r=>{if(r!==ex&&txOf(r)!==0){r.style.transition="transform .25s ease";r.style.transform="translateX(0)";}});}
listEl.addEventListener("pointerdown",e=>{const row=e.target.closest(".row");if(!row)return;sw={row,startX:e.clientX,startY:e.clientY,locked:null,base:txOf(row)};});
listEl.addEventListener("pointermove",e=>{
  if(!sw)return; const dx=e.clientX-sw.startX,dy=e.clientY-sw.startY;
  if(sw.locked===null){if(Math.abs(dx)>8&&Math.abs(dx)>Math.abs(dy)){sw.locked="h";try{sw.row.setPointerCapture(e.pointerId);}catch(_){}}else if(Math.abs(dy)>8)sw.locked="v";}
  if(sw.locked==="h"){sw.row.style.transition="none";sw.row.style.transform=`translateX(${Math.max(-76,Math.min(0,sw.base+dx))}px)`;e.preventDefault();}
});
function endSwipe(){if(!sw)return;if(sw.locked==="h"){const open=txOf(sw.row)<=-38;sw.row.style.transition="transform .25s ease";sw.row.style.transform=`translateX(${open?-72:0}px)`;closeOthers(open?sw.row:null);suppressTap=true;setTimeout(()=>suppressTap=false,60);}sw=null;}
listEl.addEventListener("pointerup",endSwipe); listEl.addEventListener("pointercancel",endSwipe);
listEl.addEventListener("click",e=>{
  const t=e.target.closest("[data-act]"); if(!t) return;
  const act=t.dataset.act,id=t.dataset.id;
  if(act==="del"){doDelete(id);return;} if(act==="clear"){clearCompleted();return;}
  if(act==="tap"){if(suppressTap)return;const row=listEl.querySelector(`.row[data-id="${id}"]`);if(row&&txOf(row)<=-10){row.style.transition="transform .25s ease";row.style.transform="translateX(0)";return;}toggle(id);}
});
function doDelete(id){
  const cell=listEl.querySelector(`.cell[data-id="${id}"]`);
  if(cell){cell.style.height=cell.offsetHeight+"px";cell.getBoundingClientRect();cell.style.overflow="hidden";cell.style.transition="height .25s ease,opacity .25s ease";cell.style.height="0px";cell.style.opacity="0";setTimeout(()=>removeItem(id),240);}
  else removeItem(id);
}

/* スワイプ削除：ホーム画面 */
function txOfH(el){const m=/translateX\(([-0-9.]+)px\)/.exec(el.style.transform||"");return m?parseFloat(m[1]):0;}
function closeOthersH(ex){listsWrap.querySelectorAll(".lcard[data-act='openlist']").forEach(c=>{if(c!==ex&&txOfH(c)!==0){c.style.transition="transform .25s ease";c.style.transform="translateX(0)";}});}
listsWrap.addEventListener("pointerdown",e=>{const card=e.target.closest(".lcard[data-act='openlist']");if(!card)return;hsw={card,startX:e.clientX,startY:e.clientY,locked:null,base:txOfH(card)};});
listsWrap.addEventListener("pointermove",e=>{
  if(!hsw)return; const dx=e.clientX-hsw.startX,dy=e.clientY-hsw.startY;
  if(hsw.locked===null){if(Math.abs(dx)>8&&Math.abs(dx)>Math.abs(dy)){hsw.locked="h";try{hsw.card.setPointerCapture(e.pointerId);}catch(_){}}else if(Math.abs(dy)>8)hsw.locked="v";}
  if(hsw.locked==="h"){hsw.card.style.transition="none";hsw.card.style.transform=`translateX(${Math.max(-84,Math.min(0,hsw.base+dx))}px)`;e.preventDefault();}
});
function endHSwipe(){if(!hsw)return;if(hsw.locked==="h"){const open=txOfH(hsw.card)<=-42;hsw.card.style.transition="transform .25s ease";hsw.card.style.transform=`translateX(${open?-80:0}px)`;closeOthersH(open?hsw.card:null);hSuppressTap=true;setTimeout(()=>hSuppressTap=false,60);}hsw=null;}
listsWrap.addEventListener("pointerup",endHSwipe); listsWrap.addEventListener("pointercancel",endHSwipe);
listsWrap.addEventListener("click",e=>{
  const t=e.target.closest("[data-act]"); if(!t) return;
  const act=t.dataset.act,listid=t.dataset.listid;
  if(act==="listdel"){
    if(confirm("このリストを削除しますか？")){
      const l=lists.find(x=>x.id===listid);
      if(l&&CLOUD){l._del=true;l._delAt=Date.now();l.at=Date.now();}else{lists=lists.filter(x=>x.id!==listid);}
      saveLocal(); mqttPublish(); renderHome();
    }
    return;
  }
  if(act==="openlist"){
    if(hSuppressTap)return;
    const card=e.target.closest(".lcard");if(card&&txOfH(card)<=-10){card.style.transition="transform .25s ease";card.style.transform="translateX(0)";return;}
    openList(listid);
  }
  if(act==="restore"){
    const l=lists.find(x=>x.id===listid); if(!l) return;
    l.archived=false; delete l.archivedAt; l.at=Date.now();
    saveLocal(); mqttPublish(); renderArchive(); toast(`「${l.name}」を復元しました`);
  }
});

/* iOSキーボード対応：リスト画面を可視領域の高さに合わせる（入力バーは常にキーボード直上に固定） */
function setListVH(){
  const ls=$("listScreen");
  if(!ls||ls.classList.contains("off")) return;
  const vv=window.visualViewport;
  const h=vv?vv.height:window.innerHeight;
  ls.style.height=h+"px";
  ls.style.top=(vv?vv.offsetTop:0)+"px";
  ls.classList.toggle("kb-open",(window.innerHeight-h)>100); // キーボード表示中は下余白を詰める
}
if(window.visualViewport){
  window.visualViewport.addEventListener("resize",setListVH);
  window.visualViewport.addEventListener("scroll",setListVH);
}
window.addEventListener("resize",setListVH);
window.addEventListener("orientationchange",()=>setTimeout(setListVH,200));

/* シート */
function syncOverlayHeight(){
  const vh=window.visualViewport?window.visualViewport.height:window.innerHeight;
  overlay.style.height=vh+"px";
}
if(window.visualViewport){
  window.visualViewport.addEventListener("resize",syncOverlayHeight);
  window.visualViewport.addEventListener("scroll",syncOverlayHeight);
}
syncOverlayHeight();
function openSheet(html){sheet.innerHTML=html;syncOverlayHeight();overlay.classList.add("show");}
function closeSheet(){overlay.classList.remove("show");}
overlay.addEventListener("click",e=>{if(e.target===overlay)closeSheet();});

/* 新規リスト */
$("fabBtn").addEventListener("click",()=>{
  openSheet(`
    <h3>新しいリスト</h3>
    <div class="field"><label>リスト名</label>
      <input id="newListName" placeholder="例：スーパー、コストコ…" maxlength="20"
             autocomplete="off" autocorrect="off" autocapitalize="off"></div>
    <button class="btn pink" id="createListBtn">作成する</button>
    <div class="gap"></div>
    <button class="btn sub" data-act="close">キャンセル</button>
  `);
  const inp=$("newListName"); inp.focus();
  inp.addEventListener("keydown",e=>{if(e.key==="Enter")$("createListBtn").click();});
  $("createListBtn").addEventListener("click",()=>{
    const name=($("newListName")?.value||"").trim()||"新しいリスト";
    const l={id:newId(),name,items:[],createdAt:Date.now(),at:Date.now()};
    lists.push(l); saveLocal(); mqttPublish(); closeSheet(); openList(l.id);
    notifyPartner(`${meName||"パートナー"}が「${name}」のリストを追加しました`);
  });
  sheet.querySelector('[data-act="close"]')?.addEventListener("click",closeSheet);
});

/* リスト名編集・削除 */
$("editListBtn").addEventListener("click",()=>{
  const l=currentList(); if(!l) return;
  openSheet(`
    <h3>リストを編集</h3>
    <div class="field"><label>リスト名</label>
      <input id="editListName" value="${esc(l.name)}" maxlength="20"
             autocomplete="off" autocorrect="off" autocapitalize="off"></div>
    <button class="btn pink" id="saveNameBtn">保存する</button>
    <div class="gap"></div>
    <button class="btn red" id="delListBtn">このリストを削除</button>
    <div class="gap"></div>
    <button class="btn sub" data-act="close">キャンセル</button>
  `);
  const inp=$("editListName"); inp.focus(); inp.select();
  inp.addEventListener("keydown",e=>{if(e.key==="Enter")$("saveNameBtn").click();});
  $("saveNameBtn").addEventListener("click",()=>{
    const name=($("editListName")?.value||"").trim(); if(!name) return;
    l.name=name; l.at=Date.now();
    $("listTitle").textContent=name; $("navListTitle").textContent=name;
    saveLocal(); mqttPublish(); closeSheet();
  });
  $("delListBtn").addEventListener("click",()=>{
    if(confirm(`「${l.name}」を削除しますか？`)){
      if(CLOUD){l._del=true;l._delAt=Date.now();l.at=Date.now();}else{lists=lists.filter(x=>x.id!==l.id);}
      saveLocal(); mqttPublish(); closeSheet(); goHome();
    }
  });
  sheet.querySelector('[data-act="close"]')?.addEventListener("click",closeSheet);
});

/* 同期設定 */
function genRoomId(){const c="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";return Array.from({length:8},()=>c[Math.floor(Math.random()*c.length)]).join("");}
$("syncBtn").addEventListener("click",()=>{
  openSheet(roomId?`
    <h3>同期設定</h3>
    <div class="syncbox on"><div class="syncrow"><span>リアルタイム同期</span><span class="sv">${CLOUD?"接続中 ✓":"接続中…"}</span></div></div>
    <div class="field"><label>ルームコード（パートナーに教える）</label><div class="roomcode">${roomId.slice(0,4)}-${roomId.slice(4)}</div></div>
    <button class="btn pink" id="copyBtn">ルームコードをコピー</button>
    <div class="gap"></div>
    <button class="btn ghost" id="enablePushBtn">🔔 通知を有効にする</button>
    <div class="gap"></div>
    <button class="btn ghost" id="testPushBtn">📨 通知をテスト送信</button>
    <div class="gap"></div>
    <button class="btn red" id="stopBtn">同期を解除</button>
    <div class="gap"></div>
    <button class="btn sub" data-act="close">閉じる</button>
  `:`
    <h3>リアルタイム同期</h3>
    <p class="hint">ルームコードをパートナーと共有するだけで、どちらかが追加・チェック・削除するとすぐに相手の画面にも反映されます。アカウント不要です。</p>
    <button class="btn pink" id="createBtn">ルームを作成する（自分が最初）</button>
    <div class="divider">── または ──</div>
    <div class="field"><label>パートナーのルームコードを入力</label>
      <input id="codeInput" placeholder="例: ABCD-EFGH" maxlength="9"
             autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false"
             style="font-size:20px;font-weight:700;letter-spacing:3px;text-align:center;">
    </div>
    <button class="btn ghost" id="joinBtn">このコードで参加する</button>
    <div class="gap"></div>
    <button class="btn sub" data-act="close">閉じる</button>
  `);
  const ci=document.getElementById("codeInput");
  if(ci) ci.addEventListener("input",()=>{let v=ci.value.replace(/[^A-Z0-9]/gi,"").toUpperCase().slice(0,8);ci.value=v.length>4?v.slice(0,4)+"-"+v.slice(4):v;});
  document.getElementById("createBtn")?.addEventListener("click",async()=>{
    const btn=document.getElementById("createBtn"); btn.textContent="接続中…"; btn.disabled=true;
    roomId=genRoomId(); localStorage.setItem("kaimono_room",roomId);
    try{await startSync();closeSheet();toast("ルームを作成しました！");autoResubscribe();setTimeout(()=>$("syncBtn").click(),400);}
    catch(e){btn.textContent="接続失敗（ネットを確認）";btn.disabled=false;localStorage.removeItem("kaimono_room");roomId="";}
  });
  document.getElementById("joinBtn")?.addEventListener("click",async()=>{
    const raw=(document.getElementById("codeInput")?.value||"").replace(/[^A-Z0-9]/gi,"").toUpperCase();
    if(raw.length!==8){toast("8桁のコードを入力してください");return;}
    const btn=document.getElementById("joinBtn"); btn.textContent="接続中…"; btn.disabled=true;
    roomId=raw; localStorage.setItem("kaimono_room",roomId); remoteAt=0;
    try{await startSync();closeSheet();toast("参加しました！");autoResubscribe();}
    catch(e){btn.textContent="接続失敗（コードを確認）";btn.disabled=false;localStorage.removeItem("kaimono_room");roomId="";}
  });
  document.getElementById("copyBtn")?.addEventListener("click",()=>{
    const code=roomId.slice(0,4)+"-"+roomId.slice(4);
    navigator.clipboard?.writeText(code).then(()=>toast("コードをコピーしました")).catch(()=>alert("コード: "+code));
  });
  document.getElementById("enablePushBtn")?.addEventListener("click",async()=>{
    await subscribePush();
  });
  document.getElementById("testPushBtn")?.addEventListener("click",async()=>{
    await sendTestPush();
  });
  document.getElementById("stopBtn")?.addEventListener("click",()=>{
    if(confirm("同期を解除します。このデバイスのデータはそのまま残ります。")){stopSync();localStorage.removeItem("kaimono_room");roomId="";closeSheet();toast("同期を解除しました");}
  });
  sheet.querySelector('[data-act="close"]')?.addEventListener("click",closeSheet);
});

/* 設定 */
function trashList(){ return lists.filter(l=>l._del); }
function openTrash(){
  const trash=trashList();
  openSheet(`
    <h3>ゴミ箱</h3>
    <p class="hint">削除したリストは30日間ここから復元できます。</p>
    ${trash.length===0?`<p class="hint" style="text-align:center;color:#C2B2BA;">ゴミ箱は空です</p>`:
      trash.map(l=>`<div class="syncrow" style="align-items:center;">
        <span>${esc(l.name)}</span>
        <button class="btn ghost" style="width:auto;padding:8px 14px;font-size:14px;" data-act="trashrestore" data-listid="${l.id}">復元</button>
      </div>`).join("")}
    <div class="gap"></div>
    <button class="btn sub" data-act="close">閉じる</button>
  `);
  sheet.querySelectorAll('[data-act="trashrestore"]').forEach(b=>b.addEventListener("click",()=>{
    const l=lists.find(x=>x.id===b.dataset.listid); if(!l) return;
    l._del=false; delete l._delAt; l.at=Date.now();
    saveLocal(); mqttPublish(); closeSheet();
    if(currentTab==="home") renderHome(); else renderArchive();
    toast(`「${l.name}」を復元しました`);
  }));
  sheet.querySelector('[data-act="close"]')?.addEventListener("click",closeSheet);
}
$("gear").addEventListener("click",()=>{
  const trashCount=trashList().length;
  openSheet(`
    <h3>設定</h3>
    <div class="field"><label>あなたの名前</label>
      <input id="meName" value="${esc(meName)}" placeholder="自分" maxlength="8"
             autocomplete="off" autocorrect="off" autocapitalize="off"></div>
    <button class="btn ghost" data-act="opentrash">🗑 ゴミ箱${trashCount>0?`（${trashCount}）`:""}</button>
    <div class="gap"></div>
    <button class="btn sub" data-act="close">閉じる</button>
  `);
  const m=document.getElementById("meName");
  if(m) m.addEventListener("input",()=>{meName=m.value.trim();localStorage.setItem("kaimono_me",meName);});
  sheet.querySelector('[data-act="opentrash"]')?.addEventListener("click",openTrash);
  sheet.querySelector('[data-act="close"]')?.addEventListener("click",closeSheet);
});

/* 起動 */
function sweepAutoArchive(){
  let changed=false;
  for(const l of lists){
    if(l._del||l.archived) continue;
    const vis=l.items.filter(i=>!i._del);
    if(vis.length>0&&vis.every(i=>i.checked)){
      l.archived=true; l.archivedAt=l.archivedAt||Date.now(); l.at=Date.now(); changed=true;
    }
  }
  if(changed){ saveLocal(); mqttPublish(); }
}
loadLocal();
sweepAutoArchive();
renderHome();
if(roomId) startSync();
initPush();
</script>
