<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>買い物リスト</title>

<!-- ▼ クラウド同期を使うときだけ有効。設定が空の間はこの端末に保存して動きます ▼ -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Hiragino Sans",sans-serif;
  background:#FFF5F8;color:#1C1C1E;-webkit-font-smoothing:antialiased;min-height:100vh;
}
body{padding-bottom:calc(96px + env(safe-area-inset-bottom));}
input,button{font-family:inherit;}
button{cursor:pointer;}
:focus-visible{outline:2px solid #FF3B81;outline-offset:2px;}

/* ===== ナビバー（コンパクト） ===== */
.navbar{
  position:sticky;top:0;z-index:50;
  height:44px;padding-top:env(safe-area-inset-top);
  display:flex;align-items:center;justify-content:center;
  border-bottom:0.5px solid transparent;
  transition:background .25s ease,border-color .25s ease;
}
.navbar.scrolled{
  background:rgba(255,245,248,0.82);
  backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-bottom-color:#F0DCE4;
}
.navtitle{font-size:17px;font-weight:600;opacity:0;transition:opacity .25s ease;height:44px;line-height:44px;}
.navbar.scrolled .navtitle{opacity:1;}
.gear{
  position:absolute;right:12px;top:calc(env(safe-area-inset-top) + 4px);
  width:36px;height:36px;border:none;border-radius:50%;
  background:#FFFFFF;color:#FF3B81;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 1px 4px rgba(214,51,108,0.10),0 4px 12px rgba(214,51,108,0.08);
  transition:transform .12s ease,background .12s ease;
}
.gear:active{transform:scale(0.9);background:#FFF0F4;}
.gear svg{width:18px;height:18px;display:block;}

/* ===== 大型タイトル ===== */
.hero{padding:4px 20px 10px;}
.hero h1{font-size:34px;font-weight:700;letter-spacing:-0.5px;}
.hero .sub{font-size:15px;color:#A8949D;margin-top:3px;font-weight:500;}

/* ===== リスト ===== */
.list-wrap{padding:6px 16px 0;}
.card{
  background:#FFFFFF;border-radius:16px;overflow:hidden;
  box-shadow:0 1px 0 rgba(0,0,0,0.02),0 10px 30px rgba(255,59,129,0.06);
}
.cell{position:relative;background:#FFFFFF;}
.cell.enter{animation:cellIn .3s cubic-bezier(.2,.8,.2,1);}
@keyframes cellIn{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:none;}}

.delbg{
  position:absolute;inset:0;display:flex;justify-content:flex-end;align-items:stretch;
  background:#FF3B30;
}
.delbtn{
  width:72px;border:none;background:transparent;color:#fff;font-size:15px;font-weight:600;height:100%;
}
.delbtn:active{background:rgba(0,0,0,0.12);}

.row{
  position:relative;z-index:1;background:#FFFFFF;
  display:flex;align-items:center;gap:13px;
  padding:13px 16px;min-height:56px;
  border-bottom:0.5px solid #F2E6EC;
  touch-action:pan-y;will-change:transform;
}
.cell:last-child .row{border-bottom:none;}

.check{
  width:27px;height:27px;border-radius:50%;flex:0 0 auto;
  border:2.5px solid #FFC2D8;background:#FFFFFF;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s ease,border-color .2s ease;
}
.check.on{background:#FF3B81;border-color:#FF3B81;}
.check.pop{animation:pop .36s cubic-bezier(.2,.9,.3,1.4);}
@keyframes pop{0%{transform:scale(1);}40%{transform:scale(1.22);}100%{transform:scale(1);}}
.tick{color:#fff;font-size:15px;font-weight:800;line-height:1;opacity:0;transform:scale(.4);transition:opacity .18s ease,transform .18s ease;}
.check.on .tick{opacity:1;transform:scale(1);}

.name{flex:1;min-width:0;font-size:17px;line-height:1.3;word-break:break-word;transition:color .2s ease;}
.row.done .name{color:#C9C2C6;text-decoration:line-through;}
.by{font-size:12px;color:#C2B2BA;flex:0 0 auto;font-weight:500;}

.clear{
  display:block;margin:16px auto 4px;border:none;background:transparent;
  color:#FF3B81;font-size:15px;font-weight:500;padding:8px 14px;border-radius:10px;
}
.clear:active{background:rgba(255,59,129,0.1);}

/* 空状態 */
.empty{text-align:center;color:#C2B2BA;padding:72px 24px;}
.empty .em{font-size:50px;margin-bottom:12px;}
.empty .t{font-size:17px;font-weight:600;color:#8A7680;}
.empty .d{font-size:14px;margin-top:5px;}

/* ===== 追加バー ===== */
.addbar{
  position:fixed;left:0;right:0;bottom:0;z-index:40;
  padding:10px 16px calc(10px + env(safe-area-inset-bottom));
  background:rgba(255,245,248,0.9);
  backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);
  border-top:0.5px solid #F0DCE4;
  display:flex;gap:10px;align-items:center;
}
.addbar input{
  flex:1;border:none;background:#FFFFFF;border-radius:13px;
  padding:13px 16px;font-size:16px;outline:none;color:#1C1C1E;
  box-shadow:0 2px 10px rgba(214,51,108,0.08);
}
.addbar input::placeholder{color:#C9B8C0;}
.plus{
  width:46px;height:46px;flex:0 0 auto;border:none;border-radius:50%;
  background:#FF3B81;color:#fff;font-size:26px;line-height:46px;font-weight:300;
  box-shadow:0 4px 14px rgba(255,59,129,0.45);transition:transform .12s ease,background .12s ease;
}
.plus:active{transform:scale(0.92);background:#E62E70;}

/* ===== シート ===== */
.overlay{
  position:fixed;inset:0;z-index:100;
  background:rgba(0,0,0,0.4);
  display:flex;align-items:flex-end;
  opacity:0;pointer-events:none;
  transition:opacity .3s ease;
}
.overlay.show{opacity:1;pointer-events:auto;}
.sheet{
  width:100%;background:#FFFFFF;border-radius:18px 18px 0 0;
  padding:20px 18px calc(20px + env(safe-area-inset-bottom));
  transform:translateY(100%);transition:transform .3s cubic-bezier(.2,.8,.2,1);
}
.overlay.show .sheet{transform:translateY(0);}
.sheet h3{font-size:19px;font-weight:700;text-align:center;margin-bottom:16px;}
.field{margin-bottom:14px;}
.field label{font-size:12px;color:#A8949D;font-weight:600;display:block;margin-bottom:6px;padding-left:2px;}
.field input{width:100%;border:none;background:#FFF0F4;border-radius:12px;padding:13px 15px;font-size:16px;outline:none;color:#1C1C1E;}
.syncbox{background:#FFF0F4;border-radius:12px;padding:4px 0;margin-bottom:12px;}
.syncbox.on{background:#FFE9F1;}
.syncrow{display:flex;justify-content:space-between;padding:11px 15px;font-size:15px;}
.syncrow:not(:last-child){border-bottom:0.5px solid #F2DCE6;}
.syncrow .sv{color:#A8949D;}
.syncbox.on .syncrow .sv{color:#E62E70;font-weight:600;}
.hint{font-size:12px;color:#A8949D;line-height:1.6;margin-bottom:16px;padding:0 2px;}
.save{width:100%;border:none;background:#FF3B81;color:#fff;border-radius:13px;padding:14px;font-size:17px;font-weight:600;}
.save:active{background:#E62E70;}

@media (prefers-reduced-motion:reduce){
  *{animation:none !important;transition:none !important;}
}
</style>
</head>
<body>

<div class="navbar" id="navbar">
  <span class="navtitle">買い物リスト</span>
  <button class="gear" id="gear" aria-label="設定"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg></button>
</div>

<div class="hero">
  <h1>買い物リスト</h1>
  <div class="sub" id="sub">リストはまだ空です</div>
</div>

<div class="list-wrap"><div id="list"></div></div>

<div class="addbar">
  <input id="inp" type="text" placeholder="追加するものを入力" enterkeyhint="done"
         autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
  <button class="plus" id="addBtn" aria-label="追加">＋</button>
</div>

<div class="overlay" id="overlay"><div class="sheet" id="sheet"></div></div>

<script>
/* ====================================================================
   ▼ クラウド同期の設定 ▼
   Firebaseコンソールでコピーした firebaseConfig を下に貼り付けてください。
   貼り付けるまではこの端末だけに保存して動きます（プレビューでも試せます）。
   ==================================================================== */
const firebaseConfig = {
  apiKey: "",
  authDomain: "",
  projectId: "",
  storageBucket: "",
  messagingSenderId: "",
  appId: ""
};
const ROOM_ID = "ouchi"; // 夫婦で同じ文字列にする（変更可）
/* ==================================================================== */

let items = [];
let CLOUD = false, db = null;
let meName = localStorage.getItem("kaimono_me") || "";
let suppressTap = false;
let sw = null;

const $ = id => document.getElementById(id);
const list = $("list");
const overlay = $("overlay");
const sheet = $("sheet");

const esc = s => String(s).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const newId = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);

/* ===== データ層（クラウド or ローカル） ===== */
function configFilled(){ return firebaseConfig.apiKey && firebaseConfig.projectId; }

function initData(){
  if (typeof firebase !== "undefined" && configFilled()){
    try{
      firebase.initializeApp(firebaseConfig);
      db = firebase.firestore();
      try{ db.enablePersistence({synchronizeTabs:true}).catch(()=>{}); }catch(e){}
      CLOUD = true;
      col().orderBy("order").onSnapshot(snap=>{
        items = snap.docs.map(d=>({id:d.id, ...d.data()}));
        renderList();
      });
    }catch(e){ console.warn("Firebase初期化に失敗。ローカルに切替", e); CLOUD=false; loadLocal(); renderList(); }
  } else {
    CLOUD = false; loadLocal(); renderList();
  }
}
function col(){ return db.collection("rooms").doc(ROOM_ID).collection("items"); }
function loadLocal(){ try{ items = JSON.parse(localStorage.getItem("kaimono_items")) || []; }catch(e){ items=[]; } }
function saveLocal(){ localStorage.setItem("kaimono_items", JSON.stringify(items)); }

function addItem(name){
  const base = { name, checked:false, addedBy:meName||"", order:Date.now(), checkedAt:0 };
  if (CLOUD){ col().add(base); }
  else { base.id=newId(); items.push(base); saveLocal(); renderList({enterId:base.id}); }
}
function toggle(id){
  const it = items.find(x=>x.id===id); if(!it) return;
  it.checked = !it.checked; it.checkedAt = it.checked ? Date.now() : 0;
  renderList({toggledId:id});
  if (CLOUD){ col().doc(id).update({checked:it.checked, checkedAt:it.checkedAt}); }
  else { saveLocal(); }
}
function removeItem(id){
  if (CLOUD){ col().doc(id).delete(); }
  else { items = items.filter(x=>x.id!==id); saveLocal(); renderList(); }
}
function clearCompleted(){
  const done = items.filter(i=>i.checked);
  if (CLOUD){ done.forEach(i=>col().doc(i.id).delete()); }
  else { items = items.filter(i=>!i.checked); saveLocal(); renderList(); }
}

/* ===== 並び順：未チェックを上（追加順）／チェック済みは下（チェックした順） ===== */
function sorted(){
  return [...items].sort((a,b)=>{
    if (!!a.checked !== !!b.checked) return a.checked ? 1 : -1;
    if (a.checked) return (a.checkedAt||0) - (b.checkedAt||0);
    return (a.order||0) - (b.order||0);
  });
}

/* ===== 描画（FLIPで滑らかに移動） ===== */
function cellHTML(i, opts){
  const checked = i.checked;
  const by = (!checked && i.addedBy) ? `<span class="by">${esc(i.addedBy)}</span>` : "";
  const enter = (opts && i.id===opts.enterId) ? " enter" : "";
  return `<div class="cell${enter}" data-id="${i.id}">
    <div class="delbg"><button class="delbtn" data-act="del" data-id="${i.id}">削除</button></div>
    <div class="row ${checked?'done':''}" data-act="tap" data-id="${i.id}">
      <span class="check ${checked?'on':''}"><span class="tick">✓</span></span>
      <span class="name">${esc(i.name)}</span>
      ${by}
    </div>
  </div>`;
}

function renderList(opts={}){
  // FLIP用に現在位置を記録
  const old = {};
  list.querySelectorAll(".cell").forEach(c=>{ old[c.dataset.id] = c.getBoundingClientRect().top; });

  const arr = sorted();
  const left = arr.filter(i=>!i.checked).length;
  $("sub").textContent = arr.length===0 ? "リストはまだ空です"
                        : (left>0 ? `あと ${left} 個` : "全部そろいました 🎉");

  if (arr.length===0){
    list.innerHTML = `<div class="empty"><div class="em">🛒</div><div class="t">リストはまだ空です</div><div class="d">下に入力して追加しましょう</div></div>`;
    return;
  }

  let html = `<div class="card">` + arr.map(i=>cellHTML(i, opts)).join("") + `</div>`;
  if (arr.some(i=>i.checked)) html += `<button class="clear" data-act="clear">チェック済みを消す</button>`;
  list.innerHTML = html;

  requestAnimationFrame(()=>{
    list.querySelectorAll(".cell").forEach(c=>{
      const id = c.dataset.id;
      if (old[id] !== undefined){
        const dy = old[id] - c.getBoundingClientRect().top;
        if (dy){
          c.style.transition = "none";
          c.style.transform = `translateY(${dy}px)`;
          requestAnimationFrame(()=>{
            c.style.transition = "transform .36s cubic-bezier(.2,.8,.2,1)";
            c.style.transform = "";
          });
        }
      }
    });
    if (opts.toggledId){
      const chk = list.querySelector(`.cell[data-id="${opts.toggledId}"] .check`);
      if (chk){ chk.classList.add("pop"); setTimeout(()=>chk.classList.remove("pop"), 380); }
    }
  });
}

/* ===== 左スワイプで削除（ポインタ操作：iPhoneでもマウスでもOK） ===== */
function currentTX(el){ const m=/translateX\(([-0-9.]+)px\)/.exec(el.style.transform||""); return m?parseFloat(m[1]):0; }
function closeOthers(except){
  list.querySelectorAll(".row").forEach(r=>{
    if (r!==except && currentTX(r)!==0){ r.style.transition="transform .25s ease"; r.style.transform="translateX(0)"; }
  });
}
list.addEventListener("pointerdown", e=>{
  const row = e.target.closest(".row"); if(!row) return;
  sw = { row, startX:e.clientX, startY:e.clientY, locked:null, base:currentTX(row) };
});
list.addEventListener("pointermove", e=>{
  if(!sw) return;
  const dx = e.clientX - sw.startX, dy = e.clientY - sw.startY;
  if (sw.locked===null){
    if (Math.abs(dx)>8 && Math.abs(dx)>Math.abs(dy)){ sw.locked="h"; try{sw.row.setPointerCapture(e.pointerId);}catch(_){} }
    else if (Math.abs(dy)>8){ sw.locked="v"; }
  }
  if (sw.locked==="h"){
    let tx = Math.max(-76, Math.min(0, sw.base + dx));
    sw.row.style.transition = "none";
    sw.row.style.transform = `translateX(${tx}px)`;
    e.preventDefault();
  }
});
function endSwipe(){
  if(!sw) return;
  if (sw.locked==="h"){
    const open = currentTX(sw.row) <= -38;
    sw.row.style.transition = "transform .25s ease";
    sw.row.style.transform = `translateX(${open?-72:0}px)`;
    closeOthers(open ? sw.row : null);
    suppressTap = true; setTimeout(()=>suppressTap=false, 60);
  }
  sw = null;
}
list.addEventListener("pointerup", endSwipe);
list.addEventListener("pointercancel", endSwipe);

/* ===== タップ・削除・クリア ===== */
function doDelete(id){
  const cell = list.querySelector(`.cell[data-id="${id}"]`);
  if (cell){
    cell.style.height = cell.offsetHeight + "px";
    cell.getBoundingClientRect();
    cell.style.overflow = "hidden";
    cell.style.transition = "height .25s ease, opacity .25s ease";
    cell.style.height = "0px"; cell.style.opacity = "0";
    setTimeout(()=>removeItem(id), 240);
  } else removeItem(id);
}
list.addEventListener("click", e=>{
  const t = e.target.closest("[data-act]"); if(!t) return;
  const act = t.dataset.act, id = t.dataset.id;
  if (act==="del"){ doDelete(id); return; }
  if (act==="clear"){ clearCompleted(); return; }
  if (act==="tap"){
    if (suppressTap) return;
    const row = list.querySelector(`.row[data-id="${id}"]`);
    if (row && currentTX(row) <= -10){ row.style.transition="transform .25s ease"; row.style.transform="translateX(0)"; return; }
    toggle(id);
  }
});

/* ===== 追加バー ===== */
function quickAdd(){
  const inp = $("inp"); const v = inp.value.trim(); if(!v) return;
  addItem(v); inp.value=""; inp.focus();
}
$("addBtn").addEventListener("click", quickAdd);
$("inp").addEventListener("keydown", e=>{ if(e.key==="Enter") quickAdd(); });

/* ===== スクロールでナビ表示 ===== */
window.addEventListener("scroll", ()=>{
  $("navbar").classList.toggle("scrolled", window.scrollY > 30);
}, {passive:true});

/* ===== 設定シート ===== */
function openSheet(html){ sheet.innerHTML = html; overlay.classList.add("show"); }
function closeSheet(){ overlay.classList.remove("show"); }
overlay.addEventListener("click", e=>{ if(e.target===overlay) closeSheet(); });

$("gear").addEventListener("click", ()=>{
  openSheet(`
    <h3>設定</h3>
    <div class="field"><label>あなたの名前</label><input id="meName" value="${esc(meName)}" placeholder="自分" maxlength="8"></div>
    <div class="syncbox ${CLOUD?'on':''}">
      <div class="syncrow"><span>同期</span><span class="sv">${CLOUD?'クラウド同期中':'この端末だけ'}</span></div>
      <div class="syncrow"><span>ルーム</span><span class="sv">${esc(ROOM_ID)}</span></div>
    </div>
    <p class="hint">夫婦で同じリストを見るには、2台ともこのファイルにFirebaseのfirebaseConfigを貼り付けて同じルームIDにします。設定で迷ったらconfigを送ってください、組み込みます。</p>
    <button class="save" data-act="closeset">閉じる</button>
  `);
  const m = $("meName");
  m.addEventListener("input", ()=>{ meName = m.value.trim(); localStorage.setItem("kaimono_me", meName); });
  sheet.querySelector('[data-act="closeset"]').addEventListener("click", closeSheet);
});

/* ===== 起動 ===== */
initData();
</script>
</body>
</html>
